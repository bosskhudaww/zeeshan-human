<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Verified | Authentication</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #ffffff;
      width: 90%;
      max-width: 380px;
      padding: 35px 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
      border: 1px solid #dbdbdb;
    }
    .badge-wrapper {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      min-height: 70px; /* Space reserved for icon */
    }
    #loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0095f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    /* Original Meta Badge Styling */
    .verified-icon {
      display: none;
      width: 70px;
      height: 70px;
    }
    h1 {
      font-size: 22px;
      color: #262626;
      margin-bottom: 10px;
      font-weight: 600;
    }
    p {
      color: #8e8e8e;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 25px;
    }
    .btn {
      display: none; 
      background-color: #0095f6;
      color: white !important;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
      border: none;
      width: 100%;
      box-sizing: border-box;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #1877f2;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .footer-meta {
      margin-top: 25px;
      font-size: 11px;
      color: #c7c7c7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
